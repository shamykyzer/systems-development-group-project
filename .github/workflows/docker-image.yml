name: Docker Image CI

on:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - ".github/workflows/docker-image.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - ".github/workflows/docker-image.yml"

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build runtime image (app target)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          tags: pinkcafe-app:runtime
          load: true   # <-- Important so 'docker run' can use it
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: docker run -d --name pinkcafe-app -p 8080:5001 pinkcafe-app:runtime

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -fsS http://localhost:8080/api >/dev/null && exit 0
            sleep 1
          done
          echo "Backend did not respond within 60s"
          docker logs pinkcafe-app 2>&1 || true
          exit 1

      - name: Verify smoke test inputs
        id: verify
        run: |
          COFFEE="backend/CSV_Files/Pink CoffeeSales March - Oct 2025.csv"
          FOOD="backend/CSV_Files/Pink CroissantSales March - Oct 2025.csv"
          test -f "$COFFEE" || { echo "Missing: $COFFEE"; exit 1; }
          test -f "$FOOD" || { echo "Missing: $FOOD"; exit 1; }
          echo "CSV files found"

      - name: Backend smoke test (datasets + analytics)
        run: |
          BASE_URL="http://127.0.0.1:8080" bash ./backend/tests/backend_smoke_test.sh

      - name: Cleanup
        if: always()
        run: docker rm -f pinkcafe-app || true
